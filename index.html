<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<!-- Gallery -->
<div class="gallery">

  <div class="card nature" data-src="Images/nature.png" data-name="Nature">
    <div class="shine"></div>
    <img src="Images/nature.png">
    <div class="caption">Nature</div>
  </div>

  <div class="card city" data-src="Images/city.png" data-name="City">
    <div class="shine"></div>
    <img src="Images/city.png">
    <div class="caption">City</div>
  </div>

  <div class="card mountain" data-src="Images/mountain.png" data-name="Mountains">
    <div class="shine"></div>
    <img src="Images/mountain.png">
    <div class="caption">Mountains</div>
  </div>

</div>
<script src="script.js"></script>

</body>
</html>
